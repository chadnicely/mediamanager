<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="head">
      <span class="brand">📸 Jotter Capture</span>
      <span id="conn" class="conn checking">…</span>
    </div>

    <div class="group">
      <label for="group">Save into group</label>
      <input id="group" type="text" placeholder="(none — top level)" autocomplete="off" />
    </div>

    <button class="cap" id="visible">
      <span class="ico">🖥</span>
      <span class="txt"><b>Visible area</b><small>What's on screen now</small></span>
    </button>
    <button class="cap" id="full">
      <span class="ico">📄</span>
      <span class="txt"><b>Full page</b><small>Scroll & stitch the whole page</small></span>
    </button>
    <button class="cap" id="region">
      <span class="ico">✂️</span>
      <span class="txt"><b>Select area</b><small>Crosshair — drag a box around it</small></span>
    </button>

    <div id="status" class="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
